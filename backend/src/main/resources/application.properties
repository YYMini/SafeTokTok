spring.application.name=backend

server.port=${PORT:8080}
server.address=0.0.0.0

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:zephyr.proxy.rlwy.net}:${MYSQLPORT:49115}/${MYSQLDATABASE:railway}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:eEbYfnPjCXfcDctpwOmHYvpJWnhtVhal}}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.hikari.initialization-fail-timeout=0

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:${SPRING_JPA_HIBERNATE_DDL_AUTO:none}}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.open-in-view=false
